app:
  description: "### 2.1 项目背景\n\n制造业采购场景中，采购合同、供应商报价单、PO 三类文档通常由不同角色、不同系统、不同模板生成。人工逐项核对存在以下问题：\n\
    \n- 审查耗时长，尤其在多行项目、外币结算、分批交付场景下效率低。\n- 容易漏看供应商主体、付款条件、税率、交期等关键异常。\n- 缺少统一的初审标准，经验依赖重。\n\
    - 人工复核过程与最终结论往往缺少结构化留痕。\n\n### 2.2 项目定位\n\n本项目是面向企业内部采购审查场景的业务型 Agent 系统。  \n\
    V1 的核心能力是：上传采购合同、供应商报价单、PO 后，自动抽取字段、完成跨文档一致性校验、识别风险与边界事项、输出审查报告，并支持人工复核与过程留痕。"
  icon: memo
  icon_background: '#E4FBCC'
  mode: workflow
  name: 供应链采购文件审查agent
  use_icon_as_answer_icon: false
