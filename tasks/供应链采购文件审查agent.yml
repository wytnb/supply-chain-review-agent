    - data:
        code: |
          # 算法说明：对三份抽取结果做 NFKC 归一、空白清洗、币种/税率/日期/数值标准化，
          # 并为每个行项目生成 match_key；规则为优先 item_code，否则 item_name + spec_model。
          import json,re,unicodedata
          def p(v):
              if isinstance(v,dict): return v
              if isinstance(v,str) and v.strip():
                  try: return json.loads(v)
                  except Exception: return {}
              return {}
          def t(v): return re.sub(r"[ \t]+"," ",unicodedata.normalize("NFKC","" if v is None else str(v))).strip()
          def key(v): return re.sub(r"\s+","",t(v)).lower()
          def cur(v):
              m={"人民币":"CNY","rmb":"CNY","cny":"CNY","美元":"USD","usd":"USD","欧元":"EUR","eur":"EUR"}
              k=key(v); return m.get(k,t(v).upper())
          def tax(v):
              s=t(v).replace("税率","").replace("增值税","")
              m=re.search(r"(\d+(?:\.\d+)?)",s)
              if not m: return s
              n=m.group(1).rstrip("0").rstrip("."); return f"{n}%"
          def num(v):
              s=t(v).replace(",",""); m=re.search(r"-?\d+(?:\.\d+)?",s)
              return m.group(0) if m else s
          def dt(v):
              s=t(v); out=[]
              for y,m,d in re.findall(r"(20\d{2})[-/.年](\d{1,2})[-/.月](\d{1,2})日?",s):
                  out.append(f"{int(y):04d}-{int(m):02d}-{int(d):02d}")
              return "/".join(dict.fromkeys(out)) if out else s
          def pay(raw,norm):
              s=t(norm) or t(raw); k=key(s)
              mp={"月结30天":"月结30天","验收合格后月结30天":"月结30天","net30":"月结30天","预付100%":"预付100%","到港单据齐全后45天付款":"到港单据齐全后45天付款"}
              return mp.get(k,s)
          def mk(item):
              code=t(item.get("item_code","")).upper()
              return code if code else f"{key(item.get('item_name',''))}|{key(item.get('spec_model',''))}"
          def norm_item(item):
              x={"line_no":t(item.get("line_no","")),"item_code":t(item.get("item_code","")).upper(),"item_name":t(item.get("item_name","")),"spec_model":t(item.get("spec_model","")),"quantity":num(item.get("quantity","")),"unit":t(item.get("unit","")),"unit_price":num(item.get("unit_price","")),"tax_included":bool(item.get("tax_included",False)),"delivery_batch_raw":t(item.get("delivery_batch_raw","")),"delivery_batch_norm":dt(item.get("delivery_batch_norm","")) or dt(item.get("delivery_batch_raw",""))}
              x["match_key"]=mk(x); return x
          def norm_doc(doc,doc_type):
              return {"doc_type":doc_type,"doc_no":t(doc.get("doc_no","")),"supplier_name":t(doc.get("supplier_name","")),"buyer_name":t(doc.get("buyer_name","")),"currency":cur(doc.get("currency","")),"tax_rate":tax(doc.get("tax_rate","")),"payment_terms_raw":t(doc.get("payment_terms_raw","")),"payment_terms_norm":pay(doc.get("payment_terms_raw",""),doc.get("payment_terms_norm","")),"delivery_date_raw":t(doc.get("delivery_date_raw","")),"delivery_date_norm":dt(doc.get("delivery_date_norm","")) or dt(doc.get("delivery_date_raw","")),"receiver_location":t(doc.get("receiver_location","")),"line_items":[norm_item(i) for i in doc.get("line_items",[])],"low_confidence_fields":doc.get("low_confidence_fields",[]) or [],"extraction_status":t(doc.get("extraction_status","")) or "SUCCESS","has_acceptance_clause":bool(doc.get("has_acceptance_clause",False)),"has_warranty_clause":bool(doc.get("has_warranty_clause",False)),"has_breach_clause":bool(doc.get("has_breach_clause",False)),"missing_clause_list":doc.get("missing_clause_list",[]) or []}
          def main(contract_text:str,quotation_text:str,po_text:str,review_task_id:str="",reviewer_role:str="")->dict:
              c=norm_doc(p(contract_text),"contract"); q=norm_doc(p(quotation_text),"quotation"); o=norm_doc(p(po_text),"po")
              warns=[]
              for d in [c,q,o]:
                  if d["extraction_status"]!="SUCCESS": warns.append(f"{d['doc_type']} extraction_status={d['extraction_status']}")
                  warns += [f"{d['doc_type']} low_confidence={f}" for f in d["low_confidence_fields"]]
