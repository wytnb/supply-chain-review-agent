        code: |
          # 算法说明：对单个已匹配行项目执行确定性规则检查；
          # 覆盖 R002、R003、R004、行级 R005 与 MR001，不让模型直接裁决风险。
          import json
          from difflib import SequenceMatcher
          def p(v):
              if isinstance(v,dict): return v
              if isinstance(v,str) and v.strip(): return json.loads(v)
              return {}
          def nn(xs): return [x for x in xs if x not in (None,"",[])]
          def flt(v):
              try: return float(v)
              except Exception: return None
          def add(arr,code,name,sev,loc,msg,evi,key=""):
              arr.append({"rule_code":code,"rule_name":name,"severity":sev,"finding_type":"risk" if code.startswith("R") else "manual_review_flag","location":loc,"message":msg,"evidence":evi,"match_key":key})
          def main(arg1:str)->dict:
              m=p(arg1); ck=m.get("contract_item") or {}; qk=m.get("quotation_item") or {}; pk=m.get("po_item") or {}; key=m.get("match_key","")
              risks=[]; manuals=[]; evidence=[{"match_key":key,"match_confidence":m.get("match_confidence",""),"match_reason":m.get("match_reason","")}]
              names=nn([ck.get("item_name"),qk.get("item_name"),pk.get("item_name")]); codes=nn([ck.get("item_code"),qk.get("item_code"),pk.get("item_code")]); specs=nn([ck.get("spec_model"),qk.get("spec_model"),pk.get("spec_model")]); qtys=nn([ck.get("quantity"),qk.get("quantity"),pk.get("quantity")]); prices=nn([ck.get("unit_price"),qk.get("unit_price"),pk.get("unit_price")]); dels=nn([ck.get("delivery_batch_norm"),qk.get("delivery_batch_norm"),pk.get("delivery_batch_norm")])
              if m.get("manual_review_candidate"): add(manuals,"MR001","近似物料名待确认","MR","line_item","该行项目匹配存在歧义，需人工确认唯一映射。",{"match_reason":m.get("match_reason","")},key)
              miss=[n for n,it in [("contract",ck),("quotation",qk),("po",pk)] if not it]
              if miss:
                  add(risks,"R002","物料不一致","P1","line_item",f"该 match_key 在部分单据中缺失：{', '.join(miss)}。",{"missing_docs":miss,"match_reason":m.get("match_reason","")},key)
              else:
                  sim=1.0 if len(names)<2 else min([SequenceMatcher(None,names[0],x).ratio() for x in names[1:]] or [1.0])
                  same_names=len(set(names))<=1; same_codes=len(set(codes))<=1; same_specs=len(set(specs))<=1
                  if not same_names:
                      if same_codes and same_specs and sim>=0.55:
                          add(manuals,"MR001","近似物料名待确认","MR","line_item","物料名称存在近义或别名差异，但编码与规格一致。",{"names":names,"codes":codes,"specs":specs,"similarity":round(sim,3)},key)
                      else:
                          add(risks,"R002","物料不一致","P1","line_item","物料名称、编码或规格在三单之间不一致。",{"names":names,"codes":codes,"specs":specs},key)
                  elif (not same_codes) or (not same_specs):
                      add(risks,"R002","物料不一致","P1","line_item","物料编码或规格在三单之间不一致。",{"names":names,"codes":codes,"specs":specs},key)
              nqty=[x for x in [flt(v) for v in qtys] if x is not None]
              if len(set(nqty))>1: add(risks,"R003","数量不一致","P1","line_item","该行项目数量在三单之间不一致。",{"quantities":qtys},key)
              npri=[x for x in [flt(v) for v in prices] if x is not None]
              if len(set(npri))>1: add(risks,"R004","单价不一致","P1","line_item","该行项目单价在三单之间不一致。",{"prices":prices},key)
              if len(set(dels))>1: add(risks,"R005","交期不一致","P2","line_item","该行项目分批交付或行级交期在三单之间不一致。",{"deliveries":dels},key)
              return {"result_json":json.dumps({"match_key":key,"item_findings":risks,"item_manual_flags":manuals,"item_evidence":evidence},ensure_ascii=False)}
