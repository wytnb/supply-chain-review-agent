          # 算法说明：按标准化后的 match_key 对齐 contract、quotation、po 三单行项目；
          # 无法唯一匹配时只标记 manual_review_candidate，不在本节点直接产出正式风险。
          import json
          def p(v):
              if isinstance(v,dict): return v
              if isinstance(v,str) and v.strip(): return json.loads(v)
              return {}
          def idx(items):
              mp={}; dup=set()
              for item in items:
                  k=item.get("match_key","")
                  if not k: continue
                  if k in mp: dup.add(k)
                  mp.setdefault(k,[]).append(item)
              return mp,dup
          def main(normalized_documents_json:str)->dict:
              docs=p(normalized_documents_json); c=docs.get("contract",{}); q=docs.get("quotation",{}); o=docs.get("po",{})
              ci,cd=idx(c.get("line_items",[])); qi,qd=idx(q.get("line_items",[])); oi,od=idx(o.get("line_items",[]))
              out=[]
              for k in sorted(set(ci)|set(qi)|set(oi)):
                  cs,qs,os=ci.get(k,[]),qi.get(k,[]),oi.get(k,[])
                  manual=(k in cd or k in qd or k in od or len(cs)>1 or len(qs)>1 or len(os)>1)
                  reason=[]
                  if manual: reason.append("存在重复或歧义 match_key")
                  if not cs or not qs or not os: reason.append("至少一份单据缺少该 match_key")
                  if not reason: reason.append("三单已按 match_key 对齐")
                  out.append(json.dumps({"match_key":k,"contract_item":cs[0] if cs else None,"quotation_item":qs[0] if qs else None,"po_item":os[0] if os else None,"match_confidence":"LOW" if manual else "HIGH","match_reason":"；".join(reason),"manual_review_candidate":manual},ensure_ascii=False))
              return {"matched_items":out}
