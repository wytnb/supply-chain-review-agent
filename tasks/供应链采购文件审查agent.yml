        code: |
          # 算法说明：对三单头部字段和合同关键条款执行确定性检查；
          # 覆盖 R001、头部 R005、R006、R007、R008，以及半结构化条款人工复核 MR002。
          import json,re
          def p(v):
              if isinstance(v,(dict,list)): return v
              if isinstance(v,str) and v.strip(): return json.loads(v)
              return {}
          def vals(*xs): return [x for x in xs if x not in ("",None,[])]
          def semi(s):
              s=(s or "").strip(); marks=["验收","开票","月底","工作周","首批","剩余","前支付","后支付","不晚于","分两批","分批"]
              return bool(s) and any(m in s for m in marks)
          def toks(s): return set(re.findall(r"20\d{2}-\d{2}-\d{2}|\d+%|\d+",s or ""))
          def add(arr,code,name,sev,loc,msg,evi):
              arr.append({"rule_code":code,"rule_name":name,"severity":sev,"finding_type":"risk" if code.startswith("R") else "manual_review_flag","location":loc,"message":msg,"evidence":evi})
          def main(normalized_documents_json:str,normalization_warnings_json:str)->dict:
              docs=p(normalized_documents_json); warns=p(normalization_warnings_json); c=docs.get("contract",{}); q=docs.get("quotation",{}); o=docs.get("po",{}); out=[]
              sup=vals(c.get("supplier_name"),q.get("supplier_name"),o.get("supplier_name"))
              if len(set(sup))>1: add(out,"R001","供应商不一致","P1","header","合同、报价单、PO 的供应商名称不一致。",{"contract":c.get("supplier_name"),"quotation":q.get("supplier_name"),"po":o.get("supplier_name")})
              cur=vals(c.get("currency"),q.get("currency"),o.get("currency")); tax=vals(c.get("tax_rate"),q.get("tax_rate"),o.get("tax_rate"))
              if len(set(cur))>1 or len(set(tax))>1: add(out,"R007","币种/税率不一致","P1","header","三单的币种或税率不一致。",{"currency_values":cur,"tax_values":tax})
              dnorm=vals(c.get("delivery_date_norm"),q.get("delivery_date_norm"),o.get("delivery_date_norm")); draw=[c.get("delivery_date_raw",""),q.get("delivery_date_raw",""),o.get("delivery_date_raw","")]
              if len(set(dnorm))>1:
                  if (semi(c.get("delivery_date_raw","")) or semi(q.get("delivery_date_raw",""))) and set().union(*[toks(x) for x in draw]):
                      add(out,"MR002","半结构化条款待确认","MR","header","交期条款存在半结构化自然语言描述，需人工确认与 PO 是否语义一致。",{"delivery_norms":dnorm,"delivery_raws":draw})
                  else:
                      add(out,"R005","交期不一致","P2","header","头部交期在三单之间不一致。",{"delivery_norms":dnorm,"delivery_raws":draw})
              pnorm=vals(c.get("payment_terms_norm"),q.get("payment_terms_norm"),o.get("payment_terms_norm")); praw=[c.get("payment_terms_raw",""),q.get("payment_terms_raw",""),o.get("payment_terms_raw","")]
              if len(set(pnorm))>1:
                  if (semi(c.get("payment_terms_raw","")) or semi(q.get("payment_terms_raw",""))) and set().union(*[toks(x) for x in praw]):
                      add(out,"MR002","半结构化条款待确认","MR","header","付款条款存在半结构化自然语言描述，需人工确认与 PO 是否语义一致。",{"payment_norms":pnorm,"payment_raws":praw})
                  else:
                      add(out,"R006","付款条件不一致","P1","header","付款条件在三单之间不一致。",{"payment_norms":pnorm,"payment_raws":praw})
              miss=(c.get("missing_clause_list",[]) or [])[:]
              if not c.get("has_acceptance_clause",False): miss.append("验收条款")
              if not c.get("has_warranty_clause",False): miss.append("质量/质保条款")
              if not c.get("has_breach_clause",False): miss.append("违约责任条款")
              miss=list(dict.fromkeys(miss))
              if miss: add(out,"R008","缺少关键条款","P1","contract_clause","合同缺少验收、质量/质保或违约责任中的关键条款。",{"missing_clause_list":miss})
              if warns: out.append({"rule_code":"INFO_NORMALIZATION_WARNING","rule_name":"抽取低置信度提示","severity":"INFO","finding_type":"info","location":"normalization","message":"存在抽取低置信度字段，已作为证据保留，不单独触发正式风险或人工复核结论。","evidence":{"warnings":warns}})
              return {"header_findings_json":json.dumps(out,ensure_ascii=False)}
