    - data:
        code: |
          # 算法说明：把逐项检查结果和头部检查结果做扁平化、去重、排序和结论聚合；
          # 聚合规则固定为“有正式风险即 REJECT；否则有人工复核项即 MANUAL_REVIEW；否则 PASS”。
          import json
          def p(v,d):
              if isinstance(v,(dict,list)): return v
              if isinstance(v,str) and v.strip(): return json.loads(v)
              return d
          def dedupe(fs):
              out=[]; seen=set()
              for f in fs:
                  k=(f.get("rule_code",""),f.get("location",""),f.get("match_key",""),json.dumps(f.get("evidence",{}),ensure_ascii=False,sort_keys=True))
                  if k in seen: continue
                  seen.add(k); out.append(f)
              return out
          def pri(f): return {"P1":0,"P2":1,"MR":2,"INFO":3}.get(f.get("severity","INFO"),9)
          def lines(fs):
              if not fs: return "- 无"
              arr=[]
              for f in fs:
                  msg=f.get("message","")
                  if f.get("match_key"): msg += f"（match_key={f.get('match_key')}）"
                  arr.append(f"- [{f.get('rule_code','')}] {f.get('rule_name','')}：{msg}")
              return "\n".join(arr)
          def evs(fs):
              if not fs: return "- 无"
              return "\n".join([f"- {f.get('rule_code','')}：{json.dumps(f.get('evidence',{}),ensure_ascii=False)}" for f in fs])
          def overview(ov):
              docs=ov.get("documents",[])
              if not docs: return "- 无"
              arr=[]
              if ov.get("review_task_id") or ov.get("reviewer_role"): arr.append(f"- 审查任务：{ov.get('review_task_id') or '未提供'} / 角色：{ov.get('reviewer_role') or '未提供'}")
              for d in docs: arr.append(f"- {d.get('doc_type','')}: 编号={d.get('doc_no','') or '未识别'}，供应商={d.get('supplier_name','') or '未识别'}，币种={d.get('currency','') or '未识别'}，税率={d.get('tax_rate','') or '未识别'}，行项目数={d.get('line_item_count',0)}")
              return "\n".join(arr)
          def main(line_item_results:list,header_findings_json:str,document_overview_json:str)->dict:
              parsed=[p(x,{}) for x in (line_item_results or [])]; header=p(header_findings_json,[]); ov=p(document_overview_json,{})
              allf=[]
              for it in parsed: allf += it.get("item_findings",[]) + it.get("item_manual_flags",[]) + it.get("item_evidence",[])
              allf += header; allf=sorted(dedupe(allf),key=pri)
              risks=[f for f in allf if f.get("rule_code","").startswith("R")]; manuals=[f for f in allf if f.get("rule_code","").startswith("MR")]; infos=[f for f in allf if f.get("finding_type")=="info"]
              final="REJECT" if risks else ("MANUAL_REVIEW" if manuals else "PASS")
              rc=len(risks); mc=len(manuals); summary=f"本次审查结论为 {final}。命中 {rc} 项正式风险，{mc} 项人工复核事项。"
              acts=[]; 
              if risks: acts.append("- 退回采购经办人修正正式风险项后重新发起审查。")
              if manuals: acts.append("- 将人工复核项提交给对应业务角色进行确认，并在 Dify 外部系统留痕。")
              if not acts: acts.append("- 当前未发现阻断性风险，可进入后续采购流程。")
              report={"final_decision":final,"risk_count":rc,"manual_review_count":mc,"findings":allf,"document_overview":ov,"summary":summary,"audit_stub":{"review_task_id":ov.get("review_task_id",""),"reviewer_role":ov.get("reviewer_role",""),"model_provider":"langgenius/ollama/ollama","model_name":"qwen3:8b","workflow_version":"0.4.0"}}
              return {"review_report_json":json.dumps(report,ensure_ascii=False,indent=2),"final_decision":final,"summary":summary,"document_overview_md":overview(ov),"risk_lines":lines(risks),"manual_review_lines":lines(manuals),"evidence_lines":evs(risks+manuals+infos),"recommended_actions":"\n".join(acts),"risk_count":rc,"manual_review_count":mc}
        code_language: python3
